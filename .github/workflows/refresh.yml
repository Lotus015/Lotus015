name: Refresh README dynamic content

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh README
        run: node .github/scripts/refresh.mjs

      - name: Commit changes
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "no README changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh dynamic README content [skip ci]"
          git push
